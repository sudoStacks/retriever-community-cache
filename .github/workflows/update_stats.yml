name: Update Dataset Stats

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate stats artifact
        run: python scripts/generate_stats.py --write

      - name: Commit stats update if changed
        run: |
          if git diff --quiet -- stats/dataset.json; then
            echo "No stats changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/dataset.json
          git commit -m "Update dataset stats"
          git push origin HEAD:main
